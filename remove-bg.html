<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remove Background (AI) — ImageMagic</title>
  <meta name="description" content="AI background removal in your browser using ONNX Runtime and U2Net." />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/icons/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <script>window.__RMBG_CANDIDATES__ = ['/assets/models/rmbg/model.onnx','https://huggingface.co/onnx-community/BRIA-RMBG-1.4/resolve/main/model.onnx'];</script>
  <script defer src="/assets/js/init-page.js"></script>
  <script defer src="/assets/js/i18n.js"></script>
  <script defer src="/assets/js/theme.js"></script>
  <script defer src="/assets/js/ads.js"></script>
  <script defer src="/assets/js/utils.js"></script>
  <script defer src="/assets/js/tools/remove-bg.js"></script>
  <!-- ONNX Runtime Web and model loaded on demand -->
</head>
<body class="bg-slate-950 text-slate-100">
  <div data-include="/partials/header.html"></div>
  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-4" data-i18n="remove_bg.title">Remove Background (AI)</h1>
    <p class="text-slate-300 mb-6" data-i18n="remove_bg.subtitle">Runs fully in‑browser with ONNX Runtime and the U²‑Net model.</p>

    <div class="grid md:grid-cols-3 gap-6">
      <section class="md:col-span-2 space-y-4">
        <div class="bg-slate-900/60 p-4 rounded border border-slate-800">
          <div id="dropzone" class="dropzone" data-dropzone>
            <p class="hint">Arraste e solte uma imagem aqui</p>
            <p class="hint">ou <button type="button" class="link" data-select-file>escolher um arquivo</button></p>
            <input id="file-input" type="file" accept="image/*" hidden />
          </div>
          <div class="mt-4 flex gap-3 items-center">
            <button id="process" class="btn-primary">Remove Background</button>
            <a id="download" class="btn" download="no-bg.png">Download</a>
          </div>
          <div id="progress" class="progress mt-2" hidden><div class="bar"></div></div>
          <p id="status" class="text-xs text-slate-400 mt-2"></p>
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <img id="preview-in" class="bg-slate-900 rounded border border-slate-800 object-contain w-full h-72" alt="input" />
          <img id="preview-out" class="bg-slate-900 rounded border border-slate-800 object-contain w-full h-72 hidden" alt="output" />
        </div>
      </section>
      <aside>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXX" data-ad-slot="100000003" data-ad-format="rectangle"></ins>
      </aside>
    </div>
  </main>
  <div data-include="/partials/footer.html"></div>
</body>
</html>
