<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magic Paint — ImageMagic</title>
  <meta name="description" content="In-browser inpainting to remove watermarks. Draw a mask and clean it." />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/icons/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <script defer src="/assets/js/init-page.js"></script>
  <script defer src="/assets/js/i18n.js"></script>
  <script defer src="/assets/js/theme.js"></script>
  <script defer src="/assets/js/ads.js"></script>
  <script defer src="/assets/js/utils.js"></script>
  <script defer src="/assets/js/tools/pincel-magico.js"></script>
  <!-- OpenCV.js loaded on demand in the tool script -->
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://docs.opencv.org https://cdn.jsdelivr.net https://unpkg.com;" />
</head>
<body class="bg-slate-950 text-slate-100">
  <div data-include="/partials/header.html"></div>
  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-4" data-i18n="watermark.title">Magic Brush</h1>
    <p class="text-slate-300 mb-6" data-i18n="watermark.subtitle">Brush over the watermark and run inpainting - fully client-side.</p>

    <div class="grid md:grid-cols-3 gap-6">
      <section class="md:col-span-2 space-y-4">
        <div class="bg-slate-900/60 p-4 rounded border border-slate-800">
          <div id="dropzone" class="dropzone" data-dropzone>
            <p class="hint">Arraste e solte uma imagem aqui</p>
            <p class="hint">ou <button type="button" class="link" data-select-file>escolher um arquivo</button></p>
            <input id="file-input" type="file" accept="image/*" hidden />
          </div>
          <div class="mt-4 flex gap-3 items-center">
            <label class="text-sm">Brush
              <input id="brush" type="range" min="5" max="100" step="1" value="30" />
            </label>
            <label class="text-sm">Algorithm
              <select id="algo" class="input">
                <option value="telea" selected>Telea</option>
                <option value="ns">Navier-Stokes</option>
              </select>
            </label>
            <button id="process" class="btn-primary">Inpaint</button>
            <a id="download" class="btn" download="clean.png">Download</a>
            <span id="status" class="text-xs text-slate-400"></span>
          </div>
          <div id="progress" class="progress mt-2" hidden><div class="bar"></div></div>
        </div>
        <div class="relative w-full bg-slate-900 rounded border border-slate-800 overflow-hidden">
          <canvas id="canvas" class="w-full h-[440px]"></canvas>
        </div>
      </section>
      <aside>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXX" data-ad-slot="100000004" data-ad-format="rectangle"></ins>
      </aside>
    </div>
  </main>
  <div data-include="/partials/footer.html"></div>
</body>
</html>
