<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resize Images — ImageMagic</title>
  <meta name="description" content="Resize images quickly with presets or custom size. All in your browser." />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/icons/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <script defer src="/assets/js/init-page.js"></script>
  <script defer src="/assets/js/i18n.js"></script>
  <script defer src="/assets/js/theme.js"></script>
  <script defer src="/assets/js/ads.js"></script>
  <script defer src="/assets/js/utils.js"></script>
  <script defer src="/assets/js/tools/resize.js"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <div data-include="/partials/header.html"></div>
  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-4" data-i18n="resize.title">Resize Images</h1>
    <p class="text-slate-300 mb-6" data-i18n="resize.subtitle">Use popular presets or set a custom size.</p>

    <div class="grid md:grid-cols-3 gap-6">
      <section class="md:col-span-2 space-y-4">
        <div class="bg-slate-900/60 p-4 rounded border border-slate-800">
          <div id="dropzone" class="dropzone" data-dropzone>
            <p class="hint">Arraste e solte uma imagem aqui</p>
            <p class="hint">ou <button type="button" class="link" data-select-file>escolher um arquivo</button></p>
            <input id="file-input" type="file" accept="image/*" hidden />
          </div>
          <div class="mt-4 flex gap-3 flex-wrap">
            <button class="preset" data-w="1080" data-h="1080">1:1 1080</button>
            <button class="preset" data-w="1080" data-h="1350">4:5 1080×1350</button>
            <button class="preset" data-w="1920" data-h="1080">16:9 1920×1080</button>
            <button class="preset" data-w="1080" data-h="1920">9:16 1080×1920</button>
            <button class="preset" data-w="1280" data-h="720">YouTube 1280×720</button>
            <button class="preset" data-w="1200" data-h="675">LinkedIn 1200×675</button>
          </div>
          <div class="mt-4 grid grid-cols-2 gap-4">
            <label class="text-sm">Width
              <input id="custom-w" type="number" class="input" placeholder="e.g., 1024" />
            </label>
            <label class="text-sm">Height
              <input id="custom-h" type="number" class="input" placeholder="e.g., 1024" />
            </label>
          </div>
          <div class="mt-4 flex items-center gap-3">
            <label class="text-sm inline-flex items-center gap-2"><input type="checkbox" id="lock-aspect" checked /> Keep aspect</label>
            <label class="text-sm inline-flex items-center gap-2">Fit: 
              <select id="fit" class="input">
                <option value="cover">Cover</option>
                <option value="contain" selected>Contain</option>
                <option value="fill">Fill</option>
              </select>
            </label>
          </div>
          <div class="mt-4 flex gap-3">
            <button id="process" class="btn-primary">Resize</button>
            <a id="download" class="btn" download="resized.png">Download</a>
          </div>
          <div id="progress" class="progress mt-2" hidden><div class="bar"></div></div>
          <p id="status" class="text-xs text-slate-400 mt-2"></p>
        </div>
        <canvas id="canvas" class="w-full bg-slate-900 rounded min-h-[200px] border border-slate-800"></canvas>
      </section>
      <aside>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXX" data-ad-slot="100000001" data-ad-format="rectangle"></ins>
      </aside>
    </div>
  </main>
  <div data-include="/partials/footer.html"></div>
</body>
</html>
